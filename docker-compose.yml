services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: nintendo
      POSTGRES_PASSWORD: nintendo_pass
      POSTGRES_DB: nintendo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://nintendo:nintendo_pass@db:5432/nintendo_db
    depends_on:
      - db
    command: >
      sh -c "npx prisma migrate deploy && node server.js"

volumes:
  postgres_data:
